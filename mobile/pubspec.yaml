name: board_game_snap
description: Identify board games from box photos. Get rules, strategy, videos, expansions, and BGG stats.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & Media
  image_picker: ^1.1.2
  # camera removed (unused; image_picker handles capture)

  # OCR / Vision (on-device)
  google_mlkit_text_recognition: ^0.13.0

  # Networking & Data
  http: ^1.2.1
  xml: ^6.5.0
  cached_network_image: ^3.3.1

  # UI & Utils
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2   # for BGG token
  intl: ^0.19.0

  # State (simple start)
  provider: ^6.1.2

  # New for features
  confetti: ^0.7.0
  audioplayers: ^6.1.0

  # Typography
  google_fonts: ^6.2.1

  # Rulebook library
  path_provider: ^2.1.4
  pdfx: ^2.1.0
  open_filex: ^4.4.0
  qr_flutter: ^4.1.0  # for generating shareable QR codes for friend collection merge
  network_info_plus: ^4.1.0  # to get local IP when hosting score sessions
  # Note: You can choose to open rulebooks with Google PDF Viewer (or any installed viewer)
  # via the "Open externally" button. pdfx provides optional in-app viewing.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    # Add game icons later if needed:
    # - assets/images/

# App icon configuration
# To regenerate icons: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/app_icon_master.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon_master.png"
    background_color: "#ffffff"
    theme_color: "#673AB7"
  windows:
    generate: true
    image_path: "assets/app_icon_master.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/app_icon_master.png"
