name: Build Mobile Apps (Android + iOS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            mobile/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Flutter doctor
        run: flutter doctor -v
        working-directory: mobile

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true
        working-directory: mobile

      - name: Clean project
        run: flutter clean
        working-directory: mobile

      - name: Build debug APK
        run: flutter config --enable-android && flutter build apk --debug --stacktrace --dart-define=BGG_TOKEN=${{ secrets.BGG_TOKEN }} --dart-define=BGG_USERNAME=${{ secrets.BGG_USERNAME }}
        working-directory: mobile

      - name: List build output
        run: ls -la build/app/outputs/flutter-apk/ || true
        working-directory: mobile
        if: always()

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: board-game-snap-android-debug
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk

      - name: Create Android Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: v${{ github.run_number }}-debug
          name: BoardGameSnap Android Debug (build ${{ github.run_number }})
          draft: false
          prerelease: true
          files: mobile/build/app/outputs/flutter-apk/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Disable Swift Package Manager (force CocoaPods for plugins)
        run: flutter config --no-enable-swift-package-manager
        working-directory: mobile

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Precache iOS artifacts
        run: flutter precache --ios
        working-directory: mobile

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          echo "$(gem env gemdir)/bin" >> $GITHUB_PATH
        shell: bash

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update
        working-directory: mobile

      - name: Build iOS (release, no codesign)
        run: flutter config --enable-ios && flutter build ios --release --no-codesign --dart-define=BGG_TOKEN=${{ secrets.BGG_TOKEN }} --dart-define=BGG_USERNAME=${{ secrets.BGG_USERNAME }}
        working-directory: mobile

      - name: Package iOS app as IPA (unsigned)
        working-directory: mobile
        run: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r -y board-game-snap-ios-unsigned.ipa Payload
        shell: bash

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: board-game-snap-ios-unsigned
          path: mobile/board-game-snap-ios-unsigned.ipa

      - name: Create iOS Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: v${{ github.run_number }}-ios
          name: BoardGameSnap iOS (unsigned IPA, build ${{ github.run_number }})
          draft: false
          prerelease: true
          files: mobile/board-game-snap-ios-unsigned.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
